<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wasm Debugger Test - OOP</title>
  <style>
    body { font-family: monospace; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
    .result { margin-top: 0.5rem; color: #080; }
  </style>
</head>
<body>
  <h1>OOP (virtual dispatch)</h1>
  <button onclick="run()">total_area()</button>
  <div class="result" id="result"></div>

  <script src="oop.js"></script>
  <script>
    let totalArea;
    OopModule().then(mod => {
      totalArea = mod.cwrap('total_area', 'number', []);
    });
    function run() {
      document.getElementById('result').textContent = `total_area() = ${totalArea()}`;
    }
  </script>
</body>
</html>
